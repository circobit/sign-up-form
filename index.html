<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="./css/style.css" rel="stylesheet">
	<title>Open the Door</title>
</head>
<body>
	<div class="container">
		<div class="hero">
			<div class="logo">
				<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M21.0667 5C21.6586 5.95805 22 7.08604 22 8.29344C22 11.7692 19.1708 14.5869 15.6807 14.5869C15.0439 14.5869 13.5939 14.4405 12.8885 13.8551L12.0067 14.7333C11.272 15.465 11.8598 15.465 12.1537 16.0505C12.1537 16.0505 12.8885 17.075 12.1537 18.0995C11.7128 18.6849 10.4783 19.5045 9.06754 18.0995L8.77362 18.3922C8.77362 18.3922 9.65538 19.4167 8.92058 20.4412C8.4797 21.0267 7.30403 21.6121 6.27531 20.5876C6.22633 20.6364 5.952 20.9096 5.2466 21.6121C4.54119 22.3146 3.67905 21.9048 3.33616 21.6121L2.45441 20.7339C1.63143 19.9143 2.1115 19.0264 2.45441 18.6849L10.0963 11.0743C10.0963 11.0743 9.3615 9.90338 9.3615 8.29344C9.3615 4.81767 12.1907 2 15.6807 2C16.4995 2 17.282 2.15509 18 2.43738" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
					<path d="M17.8851 8.29353C17.8851 9.50601 16.8982 10.4889 15.6807 10.4889C14.4633 10.4889 13.4763 9.50601 13.4763 8.29353C13.4763 7.08105 14.4633 6.09814 15.6807 6.09814C16.8982 6.09814 17.8851 7.08105 17.8851 8.29353Z" stroke="white" stroke-width="1.5"/>
				</svg>
				<p id="welcome">Welcome</p>
			</div>
			<div>
				<p id="subtext">Create your account to unlock a new experience.</p>
			</div>
		</div>

		<div class="formAndButtons">
			<div class="formDiv">
				<form class="signup">
					<div class="formGroup">
						<label for="firstName">FIRST NAME</label>
						<input type="text" id="firstName" name="firstName" required>
					</div>
					<div class="formGroup">
						<label for="lastName">LAST NAME</label>
						<input type="text" id="lastName" name="lastName" required>
					</div>
					<div class="formGroup">
						<label for="email">EMAIL</label>
						<input type="email" id="email" name="email" required>
					</div>
					<div class="formGroup">
						<label for="phoneNumber">PHONE NUMBER</label>
						<input type="tel" id="phoneNumber" name="phoneNumber" required>
					</div>
					<div class="formGroup">
						<label for="password">PASSWORD</label>
						<input type="password" id="password" name="password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d])[^\s]{8,}$" required>
					</div>
					<div class="formGroup">
						<label for="confirmPassword">CONFIRM PASSWORD</label>
						<input type="password" id="confirmPassword" name="confirmPassword" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d])[^\s]{8,}$" required>
					</div>
				</form>

				<div class="buttonCreateAccount">
					<button>Create Account</button>
				</div>
			</div>

			<div class="login">
				<p>Already have an account? <a id="login">Log in</a></p>
			</div>
		</div>


		<footer>
			<p>Photo by <a href="https://unsplash.com/@icarius_jpeg" target="_blank">Icarius.jpeg</a> in <a href="https://unsplash.com/photos/an-open-door-in-the-middle-of-a-field-of-flowers-2GjUCqsN3pg" target="_blank">Unsplash</a></p>
		</footer>
	</div>
</body>
</html>
